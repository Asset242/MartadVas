services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    ports:
      - "8006:8006"
    depends_on:
      - db
    command: sh -c "[ -f composer.json ] && [ ! -f vendor/autoload.php ] && composer install --no-interaction --prefer-dist || true; [ -f package.json ] && [ ! -f public/build/manifest.json ] && npm install && npm run build || true; php artisan serve --host=0.0.0.0 --port=8006"

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: martadvas
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: martad
      MYSQL_PASSWORD: martad
    volumes:
      - aggregator_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: unless-stopped
    ports:
      - "8086:80"
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: root

volumes:
  aggregator_mysql_data:
